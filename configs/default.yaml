name: default
output_dir: ./outputs
device: auto

data:
  dataset: cifar10
  data_dir: ./data
  num_workers: 4
  pin_memory: true

poison:
  method: badnets
  target_class: 0
  poison_ratio: 0.05
  trigger_size: 3
  trigger_position: bottom_right
  trigger_value: 1.0

model:
  arch: resnet18
  num_classes: 10
  pretrained: false

train:
  epochs: 200
  batch_size: 128
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  lr_schedule: cosine
  seed: 42

unlearn:
  method: neggrad
  epochs: 10
  lr: 0.01
  batch_size: 128
  alpha: 1.0

eval:
  batch_size: 256
  probe_trigger_positions:
    - bottom_right
    - bottom_left
    - top_right
    - top_left
    - center
  probe_trigger_sizes: [2, 3, 4, 5]
  reactivation_samples: 50
  reactivation_steps: 100
  reactivation_lr: 0.001
